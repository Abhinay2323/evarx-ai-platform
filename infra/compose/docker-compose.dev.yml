services:
  web:
    image: node:22-alpine
    container_name: evarx-web-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  web_node_modules:
