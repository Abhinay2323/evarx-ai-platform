name: evarx-api-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: evarx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evarx
      POSTGRES_PASSWORD: evarx
      POSTGRES_DB: evarx
    ports:
      - "5432:5432"
    volumes:
      - evarx_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evarx -d evarx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: evarx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - evarx_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  evarx_pg_data:
  evarx_redis_data:
