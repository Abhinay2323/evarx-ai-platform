name: evarx-api-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: evarx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evarx
      POSTGRES_PASSWORD: evarx
      POSTGRES_DB: evarx
    ports:
      - "5432:5432"
    volumes:
      - evarx_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evarx -d evarx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: evarx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - evarx_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: evarx-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-evarx-dev-only}
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evarx_pg_data:
  evarx_redis_data:
