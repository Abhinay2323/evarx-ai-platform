# LiteLLM proxy config — single OpenAI-compatible endpoint in front of every
# model provider Evarx routes to. Keep model_name aliases stable; the backend
# and the frontend always call `evarx-standard` (etc.) — only this file decides
# what physical model that resolves to.

model_list:
  - model_name: evarx-standard
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: evarx-embed
    litellm_params:
      model: gemini/gemini-embedding-001
      api_key: os.environ/GEMINI_API_KEY
      # Pin output to 768 dims so our pgvector column matches.
      dimensions: 768

  # evarx-medical is the USP slot — fine-tuned medical SLM. Until the real
  # GGUF/safetensors weights are deployed, we route this alias to Gemini Flash
  # so the rest of the platform (model picker, agent.preferred_model, /models
  # page) is wired and ready. Flip the params block when the real model lands;
  # nothing else has to change.
  - model_name: evarx-medical
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
