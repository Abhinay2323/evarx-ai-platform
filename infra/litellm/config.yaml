# LiteLLM proxy config — single OpenAI-compatible endpoint in front of every
# model provider Evarx routes to. Keep model_name aliases stable; the backend
# and the frontend always call `evarx-standard` (etc.) — only this file decides
# what physical model that resolves to.

model_list:
  - model_name: evarx-standard
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: evarx-embed
    litellm_params:
      model: gemini/gemini-embedding-001
      api_key: os.environ/GEMINI_API_KEY
      # Pin output to 768 dims so our pgvector column matches.
      dimensions: 768

  # Placeholder routes — flip on as the providers come online.
  # - model_name: evarx-medical
  #   litellm_params:
  #     model: openai/Llama-3-8B-Evarx-Medical
  #     api_base: http://vllm-medical:8000/v1
  #     api_key: os.environ/VLLM_LOCAL_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
