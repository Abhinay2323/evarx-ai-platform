# LiteLLM proxy config — single OpenAI-compatible endpoint in front of every
# model provider Evarx routes to. Keep model_name aliases stable; phase-1 only
# wires up Claude Haiku as the "Standard" engine. Add Llama-3 / Phi-3 etc. here
# when the Medical SLM endpoint is live (phase 4).

model_list:
  - model_name: evarx-standard
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # Placeholder routes — flip on as the providers come online.
  # - model_name: evarx-medical
  #   litellm_params:
  #     model: openai/Llama-3-8B-Evarx-Medical
  #     api_base: http://vllm-medical:8000/v1
  #     api_key: os.environ/VLLM_LOCAL_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
